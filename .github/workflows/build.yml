name: build deb

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scheme:
        description: '打包方案（留空则全打）'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - rootful
          - rootless
          - roothide

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Check cache
        run: |
          echo upstream_heads=`git ls-remote https://github.com/roothide/theos | head -n 1 | cut -f 1`-`git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1` >> $GITHUB_ENV

      - name: Use cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      - name: Remove unused Homebrew taps
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
          HOMEBREW_NO_AUTOREMOVE: "1"
        run: |
          if brew list --formula | grep -Fxq "bicep"; then
            brew uninstall --formula --ignore-dependencies bicep
          fi
          for tap in aws/tap azure/bicep; do
            if brew tap | grep -Fxq "$tap"; then
              brew untap "$tap"
            fi
          done

      - name: Prepare Theos
        uses: huami1314/theos-action@main

      - name: Setup GNU Make
        run: |
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Clean packages dir
        run: rm -rf packages && mkdir -p packages
        
      - name: Build Rootful
        run: |
          make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          for f in packages/*.deb; do
            [ -f "$f" ] && [[ "$f" != *"-root"*".deb" ]] && mv "$f" "${f%.deb}-rootful.deb"
          done
             
      - name: Build Rootless
        run: |
          #make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          for f in packages/*.deb; do
            [ -f "$f" ] && [[ "$f" != *"-root"*".deb" ]] && mv "$f" "${f%.deb}-rootless.deb"
          done
          
      - name: Build Roothide
        run: |
          make package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          for f in packages/*.deb; do
            [ -f "$f" ] && [[ "$f" != *"-root"*".deb" ]] && mv "$f" "${f%.deb}-roothide.deb"
          done
          
      - name: Prepare release metadata
        id: release
        run: |
          version=$(awk -F': ' '$1 == "Version" { print $2; exit }' control)
          if [ -z "$version" ]; then
            echo "Unable to read package version from control" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=DYYY_${version}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "title=DYYY_${version}#${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Verify Deb packages
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          deb_files=(packages/*.deb)
          if [ "${#deb_files[@]}" -ne 3 ]; then
            echo "Expected 3 Deb packages, found ${#deb_files[@]}:" >&2
            printf '  %s\n' "${deb_files[@]}" >&2
            exit 1
          fi

          for scheme in rootful rootless roothide; do
            scheme_files=(packages/*-"${scheme}".deb)
            if [ "${#scheme_files[@]}" -ne 1 ]; then
              echo "Expected exactly one ${scheme} package, found ${#scheme_files[@]}" >&2
              exit 1
            fi
          done

          printf 'Release asset: %s\n' "${deb_files[@]}"

      - name: Upload specific Deb packages
        uses: actions/upload-artifact@v7
        with:
          name: DYYY-${{ steps.release.outputs.version }}-${{ github.run_number }}
          path: ${{ github.workspace }}/packages/*.deb

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          gh release create "$RELEASE_TAG" packages/*.deb \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "自动构建版本，包含 Rootful、Rootless 和 Roothide 三个 Deb 安装包。" \
            --latest
