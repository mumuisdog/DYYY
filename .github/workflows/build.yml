name: build deb

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scheme:
        description: '打包方案（留空则全打）'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - rootful
          - rootless
          - roothide
          
jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Check cache
        run: |
          echo upstream_heads=`git ls-remote https://github.com/roothide/theos | head -n 1 | cut -f 1`-`git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1` >> $GITHUB_ENV

      - name: Use cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      - name: Configure Homebrew tap trust
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          if brew tap | grep -Fxq "aws/tap"; then
            brew untap aws/tap
          fi
          if brew tap | grep -Fxq "azure/bicep"; then
            brew trust --formula azure/bicep/bicep
          fi

      - name: Prepare Theos
        uses: huami1314/theos-action@main

      - name: Setup GNU Make
        run: |
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Clean packages dir
        run: rm -rf packages && mkdir -p packages
        
      - name: Build Rootful
        run: |
          make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          for f in packages/*.deb; do
            [ -f "$f" ] && [[ "$f" != *"-root"*".deb" ]] && mv "$f" "${f%.deb}-rootful.deb"
          done
             
      - name: Build Rootless
        run: |
          #make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          for f in packages/*.deb; do
            [ -f "$f" ] && [[ "$f" != *"-root"*".deb" ]] && mv "$f" "${f%.deb}-rootless.deb"
          done
          
      - name: Build Roothide
        run: |
          make package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          for f in packages/*.deb; do
            [ -f "$f" ] && [[ "$f" != *"-root"*".deb" ]] && mv "$f" "${f%.deb}-roothide.deb"
          done
          
      # 【新增】生成时间戳并写入环境变量
      - name: Generate Timestamp
        id: timestamp
        run: |
          ts=$(TZ=Asia/Shanghai date +%Y%m%d%H%M%S)
          echo "value=$ts" >> $GITHUB_OUTPUT
          echo "⏰ 构建时间: $ts (Asia/Shanghai)"
          
      - name: Upload specific Deb packages
        uses: actions/upload-artifact@v7
        with:
          name: DYYY-${{ steps.timestamp.outputs.value }}
          path: ${{ github.workspace }}/packages/*.deb
