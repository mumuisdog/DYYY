name: publish release

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: '来源 build run ID（含 artifact 的那次 Actions run）'
        required: true
        type: string
      artifact_name:
        description: 'Artifact 名称（留空则自动取该 run 的第一个 artifact）'
        required: false
        type: string
        default: ''
      skip_cooldown:
        description: '跳过 12 小时 Release 冷却'
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve source run metadata
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          ARTIFACT_NAME_INPUT: ${{ inputs.artifact_name }}
        run: |
          set -euo pipefail

          run_json=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}")
          echo "head_sha=$(jq -r '.head_sha' <<< "$run_json")" >> "$GITHUB_OUTPUT"
          echo "run_number=$(jq -r '.run_number' <<< "$run_json")" >> "$GITHUB_OUTPUT"
          echo "display_title=$(jq -r '.display_title' <<< "$run_json")" >> "$GITHUB_OUTPUT"

          if [[ -n "$ARTIFACT_NAME_INPUT" ]]; then
            artifact_name="$ARTIFACT_NAME_INPUT"
          else
            artifact_name=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/artifacts" \
              --jq '.artifacts[0].name')
          fi

          if [[ -z "$artifact_name" || "$artifact_name" == "null" ]]; then
            echo "Unable to resolve artifact name for run ${SOURCE_RUN_ID}" >&2
            exit 1
          fi

          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "Using artifact: ${artifact_name}"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.source.outputs.head_sha }}

      - name: Download release package artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.source.outputs.artifact_name }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Prepare packages directory
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p packages
          for file in *.deb *.dylib; do
            [ -f "$file" ] && mv "$file" packages/
          done
          for file in packages/*/*.deb packages/*/*.dylib; do
            [ -f "$file" ] && mv "$file" packages/
          done

          deb_files=(packages/*.deb)
          if [ "${#deb_files[@]}" -eq 0 ]; then
            echo "No .deb files found after downloading artifact" >&2
            find . -maxdepth 3 -type f | sed 's/^/  /'
            exit 1
          fi

          printf 'Downloaded release assets:\n'
          printf '  %s\n' packages/*

      - name: Prepare release metadata
        id: release
        env:
          BUILD_RUN_NUMBER: ${{ steps.source.outputs.run_number }}
        run: |
          set -euo pipefail
          version=$(awk -F': ' '$1 == "Version" { print $2; exit }' control)
          if [ -z "$version" ]; then
            echo "Unable to read package version from control" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=DYYY_${version}-build.${BUILD_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "title=DYYY_${version}#${BUILD_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Verify Deb packages
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          deb_files=(packages/*.deb)
          if [ "${#deb_files[@]}" -ne 3 ]; then
            echo "Expected 3 Deb packages, found ${#deb_files[@]}:" >&2
            printf '  %s\n' "${deb_files[@]}" >&2
            exit 1
          fi

          for scheme in rootful rootless roothide; do
            scheme_files=(packages/*-"${scheme}".deb)
            if [ "${#scheme_files[@]}" -ne 1 ]; then
              echo "Expected exactly one ${scheme} package, found ${#scheme_files[@]}" >&2
              exit 1
            fi
          done

          printf 'Release asset: %s\n' "${deb_files[@]}"

      - name: Coordinate Release publication
        id: release_gate
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: build.yml
          SOURCE_BUILD_RUN_NUMBER: ${{ steps.source.outputs.run_number }}
          RELEASE_MIN_INTERVAL_SECONDS: ${{ inputs.skip_cooldown && '0' || '43200' }}
        run: |
          if [[ "${{ inputs.skip_cooldown }}" == "true" ]]; then
            export GITHUB_RUN_NUMBER="$SOURCE_BUILD_RUN_NUMBER"
          fi
          .github/scripts/release-coordinator.sh

      - name: Generate release notes
        if: steps.release_gate.outputs.should_publish == 'true'
        run: .github/scripts/generate-release-notes.sh

      - name: Publish GitHub Release
        if: steps.release_gate.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          gh release create "$RELEASE_TAG" packages/*.deb packages/*.dylib \
            --target "${{ steps.source.outputs.head_sha }}" \
            --title "$RELEASE_TITLE" \
            --notes-file release-notes.md \
            --latest
